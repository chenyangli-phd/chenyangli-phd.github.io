<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>不喝水就犯困 · 桌面导航</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --glass: rgba(20, 26, 38, 0.76);
            --glass-light: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.10);
            --text: #f0f2f7;
            --text-muted: rgba(255, 255, 255, 0.65);
            --text-dim: rgba(255, 255, 255, 0.40);
            --shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.20);
            --radius: 16px;
            --radius-lg: 20px;
            --accent: #f4b81a;
            --transition: 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(68vw 100vh at -10% 30%, rgba(255, 165, 0, 0.55) 0 22%, transparent 24%),
                radial-gradient(44vw 60vh at 28% 2%, rgba(238, 65, 25, 0.60) 0 20%, transparent 42%),
                radial-gradient(50vw 80vh at 65% 8%, rgba(140, 200, 210, 0.50) 0 18%, transparent 40%),
                radial-gradient(46vw 80vh at 108% 45%, rgba(0, 127, 233, 0.55) 0 20%, transparent 44%),
                radial-gradient(36vw 50vh at 50% 80%, rgba(10, 109, 116, 0.50) 0 16%, transparent 44%),
                linear-gradient(135deg, #050a12 0%, #0f1a28 35%, #08131f 70%, #02060c 100%);
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0, 0, 0, 0.30) 100%);
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.08;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.30'/%3E%3C/svg%3E");
            mix-blend-mode: soft-light;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
        button,
        input {
            font: inherit;
            border: none;
            outline: none;
            background: none;
        }

        /* ===== 页面容器 ===== */
        .page {
            position: relative;
            z-index: 2;
            max-width: 1260px;
            margin: 0 auto;
            padding: 22px 28px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ===== Hero 区域：仅保留时钟，隐藏日期 ===== */
        .hero {
            text-align: center;
            margin-bottom: 20px;
            user-select: none;
        }

        .clock {
            font-size: clamp(52px, 5vw, 78px);
            font-weight: 280;
            line-height: 1.05;
            letter-spacing: -2px;
            text-shadow: 0 6px 32px rgba(0, 0, 0, 0.40);
            background: linear-gradient(135deg, #ffffff 40%, rgba(255, 255, 255, 0.65));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 日期行隐藏，只显示时间 */
        .date-line {
            display: none;
        }

        /* ===== 搜索栏（美化版） ===== */
        .search-wrap {
            width: min(680px, calc(100vw - 40px));
            margin: 0 auto 56px;
            /* 进一步增大了间距 */
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(12, 20, 34, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 0 0 0 rgba(244, 184, 26, 0);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
            overflow: visible;
            padding: 2px;
        }
        .search-wrap::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 42px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.06));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .search-wrap:focus-within {
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.50),
                inset 0 1px 0 rgba(255, 255, 255, 0.10),
                0 0 0 4px rgba(244, 184, 26, 0.10);
            transform: translateY(-1px);
        }

        .engine-button {
            width: 52px;
            height: 48px;
            cursor: pointer;
            font-size: 18px;
            color: #8ab4ff;
            border-radius: 40px 0 0 40px;
            display: grid;
            place-items: center;
            transition: color var(--transition), background var(--transition);
            flex-shrink: 0;
            margin-left: 2px;
        }
        .engine-button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .search-input {
            flex: 1;
            height: 48px;
            color: #fff;
            padding: 0 6px 0 0;
            font-size: 15px;
            background: transparent;
            min-width: 0;
            letter-spacing: 0.3px;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.30);
            font-weight: 350;
            letter-spacing: 0.2px;
        }

        .search-submit {
            width: 56px;
            height: 48px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.50);
            border-radius: 0 40px 40px 0;
            font-size: 18px;
            display: grid;
            place-items: center;
            transition: color var(--transition), background var(--transition);
            flex-shrink: 0;
            margin-right: 2px;
        }
        .search-submit:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .engine-menu {
            position: absolute;
            top: 56px;
            left: 6px;
            width: 168px;
            padding: 6px;
            background: rgba(12, 18, 30, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.50);
            display: none;
            z-index: 999;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .engine-menu.open {
            display: block;
            animation: menuSlide 0.18s ease-out;
        }
        @keyframes menuSlide {
            from {
                opacity: 0;
                transform: translateY(-6px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .engine-option {
            width: 100%;
            padding: 9px 12px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.78);
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background var(--transition), color var(--transition);
        }
        .engine-option:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #fff;
        }
        .engine-option i {
            width: 20px;
            text-align: center;
            font-size: 15px;
        }

        /* ===== Widget 网格 ===== */
        .workspace {
            width: 100%;
        }

        .widget-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 16px;
        }

        /* ===== 卡片通用样式 ===== */
        .widget {
            position: relative;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            overflow: hidden;
            min-height: 150px;
            display: flex;
            flex-direction: column;
        }

        .widget:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .widget-inner {
            flex: 1;
            padding: 18px 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .widget-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            font-weight: 500;
            margin-top: 6px;
            text-align: center;
            padding-top: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ===== 各卡片尺寸 & 颜色 ===== */
        .widget-calendar {
            grid-column: span 4;
            background: rgba(24, 30, 44, 0.88);
        }
        .widget-anniversary {
            grid-column: span 4;
            background: linear-gradient(145deg, rgba(160, 80, 30, 0.78), rgba(80, 40, 20, 0.90));
        }
        .widget-countdown {
            grid-column: span 4;
            background: linear-gradient(145deg, rgba(50, 30, 100, 0.85), rgba(20, 15, 60, 0.90));
            min-height: 150px;
        }

        /* ===== Calendar 卡片 ===== */
        .cal-month {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.70);
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 14px;
            border-radius: 30px;
            display: inline-block;
            align-self: flex-start;
            margin-bottom: 4px;
        }
        .cal-day {
            font-size: 52px;
            font-weight: 550;
            line-height: 1;
            color: #fff;
            margin-top: 2px;
        }
        .cal-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
            margin-top: 2px;
        }
        .cal-week-row {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }
        .cal-week-row span {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
            transition: background 0.2s, color 0.2s;
        }
        .cal-week-row span.active {
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        /* ===== Anniversary 卡片 ===== */
        .anni-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.78);
            letter-spacing: 0.3px;
        }
        .anni-days {
            font-size: 44px;
            font-weight: 550;
            line-height: 1;
            margin-top: 2px;
            letter-spacing: -1px;
        }
        .anni-days .unit {
            font-size: 16px;
            font-weight: 400;
            margin-left: 4px;
            opacity: 0.7;
        }
        .anni-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 4px;
        }

        /* ===== Countdown 卡片 ===== */
        .widget-countdown .widget-inner {
            align-items: center;
            text-align: center;
            padding: 18px 20px 16px;
        }
        .countdown-header {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.78);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.4px;
            font-weight: 400;
            margin-bottom: 2px;
        }
        .countdown-header i {
            font-size: 14px;
            opacity: 0.8;
            color: #b8a5ff;
        }
        .countdown-time {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #fff;
            background: transparent;
            border: none;
            padding: 0;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.30);
        }
        .countdown-foot {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.40);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* ===== 应用区域 ===== */
        .app-zone {
            width: 100%;
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: start;
        }

        .category-block {
            background: rgba(12, 18, 28, 0.50);
            border-radius: var(--radius-lg);
            padding: 14px 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: border-color var(--transition);
        }
        .category-block:hover {
            border-color: rgba(255, 255, 255, 0.10);
        }

        .category-title {
            font-size: 13px;
            font-weight: 550;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-left: 2px;
            letter-spacing: 0.3px;
        }
        .category-title i {
            color: var(--accent);
            font-size: 14px;
            opacity: 0.85;
        }

        .app-cluster {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px 10px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform var(--transition), opacity var(--transition);
            cursor: pointer;
            min-width: 0;
        }
        .app-icon:hover {
            transform: translateY(-3px) scale(1.03);
        }
        .app-icon:active {
            transform: scale(0.95);
        }

        .app-icon .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-size: 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.10);
            transition: box-shadow var(--transition), transform var(--transition);
            flex-shrink: 0;
        }
        .app-icon:hover .icon-box {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.30);
        }

        .app-icon .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            transition: color var(--transition);
        }
        .app-icon:hover .label {
            color: #fff;
        }

        /* ===== 底部名言 ===== */
        .footer-quote {
            margin-top: 28px;
            text-align: center;
            font-size: 12.5px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            font-weight: 350;
            padding: 6px 0 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            width: 100%;
        }
        .footer-quote span {
            opacity: 0.7;
        }

        /* ===== 响应式 ===== */

        @media (max-width: 1024px) {
            .page {
                padding: 18px 20px 24px;
            }
            .widget-grid {
                gap: 14px;
            }
            .app-zone {
                gap: 16px;
            }
            .app-cluster {
                gap: 10px 8px;
            }
            .app-icon .icon-box {
                width: 46px;
                height: 46px;
                font-size: 19px;
            }
            .search-wrap {
                margin-bottom: 48px;
            }
        }

        @media (max-width: 820px) {
            .widget-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 12px;
            }
            .widget-calendar {
                grid-column: span 2;
            }
            .widget-anniversary {
                grid-column: span 2;
            }
            .widget-countdown {
                grid-column: span 2;
            }

            .app-zone {
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
            }
            .app-cluster {
                grid-template-columns: repeat(3, 1fr);
            }
            .countdown-time {
                font-size: 34px;
            }
            .cal-day {
                font-size: 44px;
            }
            .cal-week-row span {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }
            .anni-days {
                font-size: 38px;
            }
            .search-wrap {
                margin-bottom: 40px;
            }
        }

        @media (max-width: 640px) {
            .page {
                padding: 14px 12px 20px;
            }

            .widget-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .widget-calendar {
                grid-column: span 1;
            }
            .widget-anniversary {
                grid-column: span 1;
            }
            .widget-countdown {
                grid-column: span 2;
                min-height: 90px;
            }
            .widget-countdown .widget-inner {
                padding: 12px 16px;
            }
            .countdown-time {
                font-size: 30px;
                letter-spacing: 2px;
            }
            .countdown-header {
                font-size: 12px;
            }
            .countdown-foot {
                font-size: 10px;
            }

            .cal-day {
                font-size: 38px;
            }
            .anni-days {
                font-size: 36px;
            }
            .cal-week-row span {
                width: 22px;
                height: 22px;
                font-size: 10px;
            }

            .app-zone {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .app-cluster {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px 8px;
            }
            .app-icon .icon-box {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .app-icon .label {
                font-size: 10px;
            }
            .category-block {
                padding: 12px 14px 14px;
            }

            .clock {
                font-size: 44px;
            }
            .search-wrap {
                width: calc(100vw - 28px);
                margin-bottom: 32px;
            }
            .search-input {
                font-size: 14px;
            }
            .engine-button,
            .search-submit {
                width: 44px;
                height: 42px;
                font-size: 16px;
            }
        }

        @media (max-width: 440px) {
            .widget-grid {
                gap: 8px;
            }
            .widget-inner {
                padding: 12px 14px 10px;
            }
            .cal-day {
                font-size: 32px;
            }
            .anni-days {
                font-size: 30px;
            }
            .widget-calendar {
                grid-column: span 2;
            }
            .widget-anniversary {
                grid-column: span 2;
            }
            .widget-countdown {
                grid-column: span 2;
                min-height: 80px;
            }
            .countdown-time {
                font-size: 26px;
                letter-spacing: 1px;
            }
            .countdown-header {
                font-size: 11px;
            }
            .app-cluster {
                grid-template-columns: repeat(3, 1fr);
            }
            .app-icon .icon-box {
                width: 40px;
                height: 40px;
                font-size: 16px;
                border-radius: 12px;
            }
            .cal-week-row span {
                width: 20px;
                height: 20px;
                font-size: 9px;
            }
            .search-wrap {
                margin-bottom: 28px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <main class="page" id="home">

        <!-- ===== Hero：仅显示时钟，日期已隐藏 ===== -->
        <section class="hero">
            <div class="clock" id="clock">--:--</div>
            <!-- 日期行已通过 CSS 隐藏 (display: none) -->
            <div class="date-line" id="dateLine">加载中…</div>
        </section>

        <!-- ===== 搜索栏（美化版） ===== -->
        <form class="search-wrap" id="searchForm">
            <button class="engine-button" type="button" id="engineButton" title="切换搜索引擎">
                <i class="fa-brands fa-microsoft"></i>
            </button>
            <input class="search-input" id="searchInput" autocomplete="off" placeholder="输入搜索内容" />
            <button class="search-submit" type="submit" aria-label="搜索">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <div class="engine-menu" id="engineMenu">
                <button class="engine-option" type="button" data-engine="google" data-icon="fa-brands fa-google">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button class="engine-option" type="button" data-engine="scholar" data-icon="fa-solid fa-graduation-cap">
                    <i class="fa-solid fa-graduation-cap"></i> Scholar
                </button>
            </div>
        </form>

        <!-- ===== Widget 网格 ===== -->
        <section class="workspace">
            <div class="widget-grid">

                <!-- Calendar -->
                <article class="widget widget-calendar">
                    <div class="widget-inner">
                        <div>
                            <div class="cal-month" id="calMonth">----年--月</div>
                            <div class="cal-day" id="calDay">--</div>
                            <div class="cal-meta" id="calMeta">第---天 · 第--周</div>
                        </div>
                        <div class="cal-week-row" id="calWeekRow"></div>
                    </div>
                    <div class="widget-label">日历</div>
                </article>

                     <!-- Countdown -->
                <article class="widget widget-countdown">
                    <div class="widget-inner">
                        <div class="countdown-header" id="countTitle">
                            <i class="fa-regular fa-clock"></i> 距离十点收工还有
                        </div>

    <script>
        // ============================================================
        // 1. 工具函数
        // ============================================================
        const $ = id => document.getElementById(id);
        const pad = n => String(n).padStart(2, '0');

        // ============================================================
        // 2. 搜索引擎
        // ============================================================
        const engines = {
            bing: { url: q => `https://www.bing.com/search?q=${encodeURIComponent(q)}`, icon: 'fa-brands fa-microsoft' },
            google: { url: q => `https://www.google.com/search?q=${encodeURIComponent(q)}`, icon: 'fa-brands fa-google' },
            scholar: { url: q => `https://scholar.google.com/scholar?q=${encodeURIComponent(q)}`, icon: 'fa-solid fa-graduation-cap' }
        };

        let currentEngine = localStorage.getItem('dashboardEngine') || 'bing';

        function setEngine(name) {
            if (!engines[name]) return;
            currentEngine = name;
            localStorage.setItem('dashboardEngine', name);
            $('engineButton').innerHTML = `<i class="${engines[name].icon}"></i>`;
            $('engineMenu').classList.remove('open');
            $('searchInput').focus();
        }

        $('engineButton').addEventListener('click', e => {
            e.stopPropagation();
            $('engineMenu').classList.toggle('open');
        });

        document.querySelectorAll('.engine-option').forEach(btn => {
            btn.addEventListener('click', () => setEngine(btn.dataset.engine));
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrap')) $('engineMenu').classList.remove('open');
        });

        $('searchForm').addEventListener('submit', e => {
            e.preventDefault();
            const q = $('searchInput').value.trim();
            if (q) {
                window.open(engines[currentEngine].url(q), '_blank', 'noopener');
                $('searchInput').value = '';
            }
        });

        setEngine('bing');

        // ============================================================
        // 3. 日期 & 时钟 & 日历 & 纪念日 & 倒计时
        // ============================================================
        function daysInYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            return Math.floor((date - start) / 86400000);
        }

        function weekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateDateTime() {
            const now = new Date();
            const week = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekShort = ['日', '一', '二', '三', '四', '五', '六'];

            // 仅更新时钟（日期行已隐藏，无需更新）
            $('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
            // 虽然 dateLine 隐藏，但更新也无妨
            $('dateLine').textContent = `${now.getMonth() + 1}月${now.getDate()}日  ${week[now.getDay()]}`;
            
            $('calMonth').textContent = `${now.getFullYear()}年${now.getMonth() + 1}月`;
            $('calDay').textContent = now.getDate();
            $('calMeta').textContent = `第${daysInYear(now)}天 · 第${weekNumber(now)}周`;

            const todayIndex = now.getDay();
            let weekHtml = '';
            for (let i = 0; i < 7; i++) {
                const isActive = (i === todayIndex);
                weekHtml += `<span class="${isActive ? 'active' : ''}">${weekShort[i]}</span>`;
            }
            $('calWeekRow').innerHTML = weekHtml;

            const base = new Date('1999-10-04T00:00:00');
            $('lifeDays').textContent = Math.floor((now - base) / 86400000);

            // 收工倒计时
            const end = new Date(now);
            end.setHours(22, 0, 0, 0);
            if (now > end) end.setDate(end.getDate() + 1);
            const diff = Math.max(0, end - now);
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            const isTomorrow = now.getHours() >= 22;
            const titleText = isTomorrow ? '明天十点收工还有' : '距离十点收工还有';
            $('countTitle').innerHTML = `<i class="fa-regular fa-clock"></i> ${titleText}`;
            $('countTime').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
            $('countFoot').textContent = isTomorrow ? '🌙 今晚好好玩手机，明天继续摆' : '⏳ 就不能不玩手机吗';
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ============================================================
        // 4. 键盘快捷键
        // ============================================================
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                $('searchInput').focus();
                $('searchInput').select();
            }
            if (e.key === 'Escape') {
                $('searchInput').blur();
                $('engineMenu').classList.remove('open');
            }
        });

        console.log('🌙 不喝水就犯困 · 桌面导航 (仅显示时间，间距再增大)');
        console.log('📌 快捷键 Ctrl+K / Cmd+K 聚焦搜索');
    </script>
